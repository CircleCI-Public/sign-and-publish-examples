version: 2.1

jobs:
  npm_publish_example:
    docker:
      - image: cimg/node:25.8
    working_directory: ~/project/npm
    steps:
      - checkout:
          path: ~/project
      - run:
          name: Install dependencies
          command: npm ci
      - run:
          name: Run tests
          command: npm test
      - run:
          name: Set dynamic version
          command: npm run build
      - run:
          name: Publish to npm
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npm publish --access public

workflows:
  npm_publish_production:
    jobs:
      - npm_publish_example:
          context:
            - trusted-publishing-guard
          name: NPM Publish Production
          filters:
            branches:
              only:
                - main
